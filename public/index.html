const QC_CATS=[
  {id:"general",label:"General Review",icon:"🔍",prompt:"Review this mechanical drawing for general completeness, coordination issues, missing information, and errors or inconsistencies."},
  {id:"code",label:"Code Compliance",icon:"📜",prompt:"Review for code compliance against IMC, ASHRAE 62.1, ASHRAE 90.1, NFPA 90A. List violations or concerns."},
  {id:"coordination",label:"MEP Coordination",icon:"🔗",prompt:"Review for MEP coordination issues. Identify conflicts with electrical, plumbing, or structural systems."},
  {id:"energy",label:"Energy Compliance",icon:"⚡",prompt:"Review for ASHRAE 90.1 energy code compliance: insulation, equipment efficiencies, controls, energy recovery."},
  {id:"constructability",label:"Constructability",icon:"🏗️",prompt:"Review for constructability: difficult installations, missing clearances, access issues, field coordination problems."},
  {id:"presentation",label:"Drawing Presentation",icon:"🎨",prompt:"Review drawing presentation: text overlapping, background patterns cluttering, font compliance, inconsistent text sizes."},
];
function QCReview(){
  const [file,setFile]=useState(null);const [fileName,setFileName]=useState("");const [selCats,setSelCats]=useState(["general"]);const [loading,setLoading]=useState(false);const [results,setResults]=useState([]);const [dragging,setDragging]=useState(false);const [projName,setProjName]=useState("");const [projLoc,setProjLoc]=useState("");const [reviewer,setReviewer]=useState("");const [phases,setPhases]=useState([]);const fileRef=useRef();
  const handleFile=f=>{if(!f||f.type!=="application/pdf")return;setFile(f);setFileName(f.name);};
  const hd=e=>{e.preventDefault();e.stopPropagation();};
  const runReview=async()=>{
    if(!file||loading)return;const cats=QC_CATS.filter(c=>selCats.includes(c.id));if(!cats.length)return;
    setLoading(true);
    const b64=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(rd.result.split(",")[1]);rd.onerror=rej;rd.readAsDataURL(file);});
    const phTxt=phases.length>0?"\n\nDesign Phase: "+phases.join(", "):"";const locTxt=projLoc?"\nProject Location: "+projLoc:"";
    const all=await Promise.all(cats.map(async cat=>{
      try{        const resp=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:"You are an expert mechanical engineer performing QC review of HVAC drawings. Organize findings into: CRITICAL ISSUES, MAJOR COMMENTS, MINOR COMMENTS, RECOMMENDATIONS. Number each item.",messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:cat.prompt+(projName?"\nProject: "+projName:"")+locTxt+phTxt+(reviewer?"\nReviewer: "+reviewer:"")}]}]})});
        const data=await resp.json();return{ok:true,cat,text:data.content?.map(i=>i.text||"").join("")||"No response."};
      }catch{return{ok:false,cat,text:"Review failed."};}}
    ));
    setResults(p=>[{id:Date.now(),ts:new Date().toLocaleString(),fileName,projName,projLoc,reviewer,phases,reviews:all.map(r=>({id:r.cat.id,label:r.cat.label,icon:r.cat.icon,text:r.text}))},...p]);
    setLoading(false);
  };
  const parseSecs=text=>{
    const cats=[{k:"CRITICAL",l:"Critical Issues",c:"#DC2626",bg:"#FEF2F2",ico:"🚨"},{k:"MAJOR",l:"Major Comments",c:"#D97706",bg:"#FFFBEB",ico:"⚠️"},{k:"MINOR",l:"Minor Comments",c:"#2563EB",bg:"#EFF6FF",ico:"ℹ️"},{k:"RECOMMENDATION",l:"Recommendations",c:"#059669",bg:"#F0FDF4",ico:"💡"}];
    const secs=[];cats.forEach(cat=>{const m=text.match(new RegExp(cat.k+"[^:]*:(.*?)(?=CRITICAL|MAJOR|MINOR|RECOMMENDATION|$)","si"));if(m&&m[1].trim())secs.push({...cat,content:m[1].trim()});});
    return secs.length?secs:[{k:"REVIEW",l:"Findings",c:"#374151",bg:"#F9FAFB",ico:"📋",content:text}];
  };
  const PHASES=["SD","50% DD","100% DD","50% CD","90% CD","100% IFC"];
  const pColors={"SD":"7C3AED","50% DD":"0891B2","100% DD":"1D4ED8","50% CD":"059669","90% CD":"D97706","100% IFC":"DC2626"};
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
      <div style={s.card}><p style={s.secTitle}>Project Info</p><div style={{display:"grid",gap:10}}>
        <div><label style={s.label}>Project Name</label><input style={s.input} value={projName} onChange={e=>setProjName(e.target.value)} placeholder="e.g. Main Street Office"/></div>
        <div><label style={s.label}>Location</label><input style={s.input} value={projLoc} onChange={e=>setProjLoc(e.target.value)} placeholder="e.g. Austin, TX"/></div>
        <div><label style={s.label}>Reviewer Initials</label><input style={s.input} value={reviewer} onChange={e=>setReviewer(e.target.value)} placeholder="e.g. JD"/></div>
      </div></div>
      <div style={s.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><p style={{...s.secTitle,marginBottom:0}}>Review Types</p><div style={{display:"flex",gap:6}}><button onClick={()=>setSelCats(QC_CATS.map(c=>c.id))} style={{...s.btnOut,fontSize:11,padding:"3px 10px"}}>All</button><button onClick={()=>setSelCats([])} style={{...s.btnOut,fontSize:11,padding:"3px 10px"}}>None</button></div></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>{QC_CATS.map(cat=>{const act=selCats.includes(cat.id);return <div key={cat.id} onClick={()=>setSelCats(p=>p.includes(cat.id)?p.filter(x=>x!==cat.id):[...p,cat.id])} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 9px",borderRadius:8,border:"2px solid "+(act?C.accent:C.border),background:act?C.accentLight:C.surface,cursor:"pointer",userSelect:"none"}}>
          <div style={{width:14,height:14,borderRadius:3,border:"2px solid "+(act?C.accent:C.border),background:act?C.accent:"white",display:"flex",alignItems:"center",justifyContent:"center"}}>{act&&<span style={{color:"white",fontSize:9}}>✓</span>}</div>
          <span style={{fontSize:11}}>{cat.icon}</span><span style={{fontSize:11,fontWeight:act?600:400,color:act?C.accent:C.text}}>{cat.label}</span>
        </div>;})}
        </div>
      </div>
    </div>
    <div style={{...s.card,marginBottom:16}}>
      <p style={{...s.secTitle,marginBottom:4}}>Design Phase</p>
      <p style={{fontSize:11,color:C.textMuted,marginBottom:10}}>Select the current design phase for this review</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PHASES.map(ph=>{const act=phases[0]===ph;const hx="#"+pColors[ph];return <div key={ph} onClick={()=>setPhases(act?[]:[ph])} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,border:"2px solid "+(act?hx:C.border),background:act?hx+"18":C.surface,cursor:"pointer",userSelect:"none"}}>
        <div style={{width:13,height:13,borderRadius:50,border:"2px solid "+(act?hx:C.border),background:act?hx:"white",display:"flex",alignItems:"center",justifyContent:"center"}}>{act&&<div style={{width:5,height:5,borderRadius:50,background:"white"}}/>}</div>
        <span style={{fontSize:12,fontWeight:act?700:400,color:act?hx:C.text}}>{ph}</span>
      </div>;})}
      </div>
    </div>
    <div style={{...s.card,marginBottom:16}}>
      <p style={s.secTitle}>Upload Drawing / Document</p>
      <div style={{display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div onDragEnter={e=>{hd(e);setDragging(true);}} onDragLeave={e=>{hd(e);setDragging(false);}} onDragOver={hd} onDrop={e=>{hd(e);setDragging(false);handleFile(e.dataTransfer.files[0]);}} onClick={()=>fileRef.current.click()} style={{flex:1,minHeight:90,border:"2px dashed "+(dragging?C.accent:file?"#059669":C.border),borderRadius:10,background:dragging?C.accentLight:file?"#F0FDF4":C.surfaceAlt,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",padding:14}}>
          <span style={{fontSize:24}}>{file?"✅":"📄"}</span>
          <div style={{fontSize:13,fontWeight:600,color:file?"#059669":C.text}}>{file?fileName:"Drag PDF here or click to browse"}</div>
          {file&&<button onClick={e=>{e.stopPropagation();setFile(null);setFileName("");}} style={{fontSize:11,color:C.danger,background:"none",border:"1px solid "+C.danger,borderRadius:5,padding:"2px 8px",cursor:"pointer"}}>Remove</button>}
          <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value="";}}/>
        </div>
        <button onClick={runReview} disabled={!file||loading||!selCats.length} style={{...s.btn,background:!file||loading||!selCats.length?"#9CA3AF":"#1D4ED8",padding:"12px 20px",fontSize:13,fontWeight:700,cursor:!file||loading?"not-allowed":"pointer",minWidth:150}}>
          {loading?"Running...":"Run "+selCats.length+" Review"+(selCats.length!==1?"s":"")}
        </button>
      </div>
    </div>
    {results.map(r=><div key={r.id} style={{...s.card,marginBottom:16}}>
      <div style={{marginBottom:14}}><div style={{fontSize:14,fontWeight:700}}>{r.fileName}</div><div style={{fontSize:11,color:C.textMuted}}>{r.projName?r.projName+" · ":""}{r.ts}</div></div>
      {r.reviews.map((rev,ri)=><div key={ri} style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",background:C.surfaceAlt,borderRadius:"8px 8px 0 0",border:"1px solid "+C.border,borderBottom:"none"}}><span>{rev.icon}</span><span style={{fontSize:12,fontWeight:700}}>{rev.label}</span></div>
        <div style={{border:"1px solid "+C.border,borderRadius:"0 0 8px 8px",overflow:"hidden"}}>
          {parseSecs(rev.text).map((sec,i)=><div key={i}><div style={{padding:"6px 14px",background:sec.bg,display:"flex",alignItems:"center",gap:7}}><span>{sec.ico}</span><span style={{fontSize:11.5,fontWeight:700,color:sec.c}}>{sec.l}</span></div><div style={{padding:"10px 14px",background:"#fff",fontSize:12,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{sec.content}</div></div>)}
        </div>
      </div>)}
    </div>)}
    {!results.length&&!loading&&<div style={{...s.card,display:"flex",flexDirection:"column",alignItems:"center",minHeight:180,justifyContent:"center",color:C.textLight,gap:10}}><span style={{fontSize:36}}>🔍</span><div style={{fontSize:14,fontWeight:600}}>Upload a PDF and run a review</div></div>}
  </div>;
}

  [style*="cursor:pointer"]{cursor:default!important}@media print{@page{margin:.6in;size:letter}}</style>
  </head><body>
  <h2>${projName||"HVAC Engineering Dashboard"}</h2>
  <div class="sub">${tabLabel} &nbsp;·&nbsp; ${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
  ${content.innerHTML}
  <script>setTimeout(function(){window.print();},400);<\/script></body></html>`);
  win.document.close();
}

// ── APP ───────────────────────────────────────────────────
const TABS=[{id:"intro",label:"🏠 Home"},{id:"sdload",label:"SD Load Calcs"},{id:"duct",label:"Duct Sizing"},{id:"pump",label:"Pump Sizing"},{id:"psych",label:"Psychrometric"},{id:"boiler",label:"🔥 Boiler/Heating"},{id:"design",label:"🌤️ Design Conditions"},{id:"equations",label:"Equations"},{id:"codes",label:"💬 Code AI"},{id:"checklist",label:"📋 Checklist"},{id:"qc",label:"🔍 QC Review"}];

function App(){
  const [tab,setTab]=useState("intro");
  const [sdState,setSdState]=useState(initSd);
  const [pumpLinked,setPumpLinked]=useState(false);
  const [pumpSource,setPumpSource]=useState("");
  const [projName,setProjName]=useState("");
  const [saveStatus,setSaveStatus]=useState("");

  const saveProject=()=>{
    if(!projName.trim()){setSaveStatus("⚠ Enter a name");setTimeout(()=>setSaveStatus(""),2000);return;}
    try{localStorage.setItem("hvac_proj_"+projName.trim(),JSON.stringify({sdState,pumpLinked,pumpSource,savedAt:new Date().toISOString()}));setSaveStatus("✓ Saved");}
    catch{setSaveStatus("✗ Failed");}
    setTimeout(()=>setSaveStatus(""),2500);
  };
  const loadProject=()=>{
    if(!projName.trim()){setSaveStatus("⚠ Enter a name");setTimeout(()=>setSaveStatus(""),2000);return;}
    try{
      const raw=localStorage.getItem("hvac_proj_"+projName.trim());
      if(!raw){setSaveStatus("⚠ Not found");setTimeout(()=>setSaveStatus(""),2000);return;}
      const data=JSON.parse(raw);
      if(data.sdState)setSdState(data.sdState);
      if(data.pumpLinked!==undefined)setPumpLinked(data.pumpLinked);
      if(data.pumpSource!==undefined)setPumpSource(data.pumpSource);
      setSaveStatus("✓ Loaded");
    }catch{setSaveStatus("✗ Failed");}
    setTimeout(()=>setSaveStatus(""),2500);
  };
  const statusColor=saveStatus.startsWith("✓")?"#059669":saveStatus.startsWith("⚠")?"#D97706":"#DC2626";
  const tabLabel=TABS.find(t=>t.id===tab)?.label||tab;

  return <div style={s.app}>
    <div style={s.header} className="no-print">
      <div style={s.logo}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div><p style={{fontSize:16,fontWeight:600,margin:0}}>HVAC Engineering Dashboard</p><p style={{fontSize:11,color:C.textMuted,margin:"1px 0 0"}}>Mechanical Engineering Tools</p></div>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <input value={projName} onChange={e=>setProjName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveProject()} placeholder="Project name..." style={{padding:"6px 10px",border:"1px solid "+C.border,borderRadius:7,fontSize:12,outline:"none",width:160}}/>
        <button onClick={saveProject} style={{padding:"6px 12px",background:C.accent,color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>Save
        </button>
        <button onClick={loadProject} style={{padding:"6px 12px",background:"transparent",color:C.accent,border:"1px solid "+C.accent,borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Load
        </button>
        {saveStatus&&<span style={{fontSize:11,fontWeight:600,color:statusColor,minWidth:70}}>{saveStatus}</span>}
        <button onClick={()=>printTab(tab,tabLabel,projName)} style={{padding:"6px 12px",background:"#374151",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print
        </button>
      </div>
    </div>
    <div style={s.nav} className="no-print">{TABS.map(t=><button key={t.id} style={s.tabBtn(tab===t.id)} onClick={()=>setTab(t.id)}>{t.label}</button>)}</div>
    <div id="tab-content" style={s.content}>
      {tab==="intro"&&<IntroTab onNav={setTab}/>}
      {tab==="sdload"&&<SDLoadCalcs sdState={sdState} setSdState={setSdState} projName={projName}/>}
      {tab==="duct"&&<DuctSizing/>}
      {tab==="pump"&&<PumpSizing sdState={sdState} pumpLinked={pumpLinked} setPumpLinked={setPumpLinked} pumpSource={pumpSource} setPumpSource={setPumpSource}/>}
      {tab==="psych"&&<Psychrometric/>}
      {tab==="boiler"&&<BoilerHeating/>}
      {tab==="design"&&<DesignConditions/>}
      {tab==="equations"&&<HVACEquations/>}
      {tab==="codes"&&<CodeAssistant/>}
      {tab==="checklist"&&<DrawingChecklist/>}
      {tab==="qc"&&<QCReview/>}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
